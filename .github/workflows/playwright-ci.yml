name: Playwright CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Ensure generated directory exists
        run: mkdir -p generated

      - name: Create sample generated test if none exist
        shell: bash
        run: |
          if [ -z "$(find generated -name '*.spec.js' -print -quit)" ]; then
            cat > generated/ci-smoke.spec.js <<'EOF'
            import { test, expect } from '@playwright/test';
            test.describe('CI Smoke Suite', () => {
              test('example.com loads', async ({ page }) => {
                await page.goto('https://example.com');
                await expect(page).toHaveTitle(/Example/);
              });
            });
            EOF
          fi

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            server/playwright-report
            server/test-results
